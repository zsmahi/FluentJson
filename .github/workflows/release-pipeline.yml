name: FluentJson RC1 Release Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "gh-pages-publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  lint-and-format:
    name: Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Verify code formatting
        run: dotnet format --verify-no-changes
        # This will fail the pipeline if any files do not match the formatting rules.

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable

  ci-build-and-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore
        
      - name: Restore .NET built-in tools
        run: dotnet tool restore || true
        
      - name: Run Unit and Functional Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to gh-pages branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            
      - name: Run Critical Benchmarks
        run: dotnet run -c Release --project tests/FluentJson.Benchmarks/FluentJson.Benchmarks.csproj -- --filter *DeserializationBenchmarks* --exporters briefjson --job Short --iterationCount 5 --warmupCount 2
        
      - name: Analyze Performance
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: BenchmarkDotNet Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: BenchmarkDotNet.Artifacts/results/FluentJson.Benchmarks.DeserializationBenchmarks-report-brief.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%' # Fails if degradation > 20%
          fail-on-alert: true
          comment-on-alert: true
          summary-always: true
          skip-fetch-gh-pages: true # Skip fetching branch if it doesn't exist yet

  mutation-gate:
    name: Mutation Testing (Stryker.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install Stryker CLI (Local Tool)
        run: |
          dotnet new tool-manifest || true
          dotnet tool install dotnet-stryker
          
      - name: Restore .NET tools
        run: dotnet tool restore
        
      - name: Run Stryker on Core
        run: dotnet tool run dotnet-stryker --project src/FluentJson.Core/FluentJson.Core.csproj --break-at 100
        working-directory: .

  publish-docs:
    name: Publish Documentation (Docfx)
    needs: [ci-build-and-test, performance-benchmarks]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # Needed for deploying to gh-pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install Docfx
        run: dotnet tool install -g docfx
        
      - name: Build Documentation
        run: docfx docfx.json
        
      - name: Create .nojekyll
        run: touch _site/.nojekyll
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true # CRITICAL: Don't delete benchmark results (dev/bench)!

  cd-release:
    name: Continuous Deployment (NuGet & GitHub Release)
    needs: [lint-and-format, security-scan, ci-build-and-test, performance-benchmarks, mutation-gate, publish-docs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for comprehensive changelog generation

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Pack NuGet packages
        run: dotnet pack --configuration Release /p:Version=${GITHUB_REF_NAME#v} --output ./nupkg_artifacts
        
      # Sign NuGet Packages 
      # Note: Requires importing a valid code signing certificate via Secrets
      - name: Sign NuGet Packages
        run: |
          # Example signature command - adjust certificate path and timestamper as needed
          # dotnet nuget sign ./nupkg_artifacts/*.nupkg --certificate-path ${{ secrets.CERT_PATH }} --certificate-password ${{ secrets.CERT_PASSWORD }} --timestamper http://timestamp.digicert.com
          echo "Placeholder for Nuget Signing. Modify with actual cert secrets."

      - name: Push Core to NuGet
        run: dotnet nuget push ./nupkg_artifacts/FluentJson.Core.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Push STJ to NuGet
        run: dotnet nuget push ./nupkg_artifacts/FluentJson.SystemTextJson.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Push Newtonsoft to NuGet
        run: dotnet nuget push ./nupkg_artifacts/FluentJson.Newtonsoft.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkg_artifacts/*.nupkg
